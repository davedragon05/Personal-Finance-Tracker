<div class="space-y-6">
  <div class="flex items-center justify-between">
    <h2 class="text-lg font-mono neon-text-cyan">🛡 DEBT & LIABILITY TRACKER</h2>
    <button @click="debtModal = { subcategory_id: '', year: year, month: month, outstanding_balance: '', payment_made: 0 };
             openModal('debt-modal')" class="btn-cyber text-xs">
      ＋ Record Debt
    </button>
  </div>

  <div class="glass-panel p-5">
    <div class="overflow-x-auto">
      <table class="table-cyber w-full">
        <thead>
          <tr>
            <th>Account</th>
            <th>Month</th>
            <th>Year</th>
            <th class="text-right">Outstanding Balance</th>
            <th class="text-right">Payment Made</th>
          </tr>
        </thead>
        <tbody>
          <template x-for="entry in debtHistory" :key="entry.id">
            <tr>
              <td class="text-xs text-slate-300" x-text="entry.subcategory_name"></td>
              <td class="text-xs text-slate-400" x-text="getMonthName(entry.month)"></td>
              <td class="text-xs text-slate-400" x-text="entry.year"></td>
              <td class="text-right font-mono neon-text-rose text-xs" x-text="'₱' + numberWithCommas(entry.outstanding_balance)"></td>
              <td class="text-right font-mono text-emerald-400 text-xs" x-text="'₱' + numberWithCommas(entry.payment_made)"></td>
            </tr>
          </template>
          <tr x-show="debtHistory.length === 0">
            <td colspan="5" class="text-center text-slate-600 py-8">No debt records</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <div id="debt-modal"
       x-show="modalOpen === 'debt-modal'"
       @keydown.escape.window="closeModal()"
       class="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/80 backdrop-blur-sm"
       @click="closeModal()"
       x-transition:enter="transition ease-out duration-300"
       x-transition:enter-start="opacity-0"
       x-transition:enter-end="opacity-100"
       x-transition:leave="transition ease-in duration-200"
       x-transition:leave-start="opacity-100"
       x-transition:leave-end="opacity-0">
    <div class="w-full max-w-sm p-4" @click.stop>
      <div class="glass-panel p-6">
        <h3 class="text-sm font-mono neon-text-cyan mb-4">Record Debt Entry</h3>
        <form @submit.prevent="saveDebtEntry(); closeModal()" class="space-y-4">
          <div>
            <label class="block text-xs text-slate-500 mb-1">Sub-Category</label>
            <select x-model="debtModal.subcategory_id" class="input-cyber text-xs" required>
              <option value="">— Select —</option>
              <template x-for="s in subcategories.filter(s => s.pillar_name === 'DEBT')" :key="s.id">
                <option :value="s.id" x-text="s.name"></option>
              </template>
            </select>
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-xs text-slate-500 mb-1">Year</label>
              <input type="number" x-model="debtModal.year" class="input-cyber text-xs" required>
            </div>
            <div>
              <label class="block text-xs text-slate-500 mb-1">Month</label>
              <select x-model="debtModal.month" class="input-cyber text-xs" required>
                <template x-for="(mName, idx) in ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']">
                  <option :value="idx+1" x-text="mName"></option>
                </template>
              </select>
            </div>
          </div>
          <div>
            <label class="block text-xs text-slate-500 mb-1">Outstanding Balance (₱)</label>
            <input type="number" step="0.01" x-model="debtModal.outstanding_balance" class="input-cyber text-xs" required>
          </div>
          <div>
            <label class="block text-xs text-slate-500 mb-1">Payment Made (₱)</label>
            <input type="number" step="0.01" x-model="debtModal.payment_made" class="input-cyber text-xs">
          </div>
          <div class="flex gap-3 justify-end">
            <button type="button" @click="closeModal()" class="text-xs text-slate-500 hover:text-slate-300 px-4 py-2">Cancel</button>
            <button type="submit" class="btn-cyber-rose text-xs">💾 Save</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
