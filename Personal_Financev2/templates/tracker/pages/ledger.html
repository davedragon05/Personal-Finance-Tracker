<div class="space-y-6">
  <div class="flex items-center justify-between">
    <h2 class="text-lg font-mono neon-text-cyan">📝 TRANSACTION TERMINAL</h2>
    <button @click="openModal('txn-modal')" class="btn-cyber text-xs">
      ＋ New Transaction
    </button>
  </div>

  <div class="glass-panel p-5">
    <div class="flex gap-3 mb-4 flex-wrap items-center">
      <select x-model="filter.year" @change="txnPage = 1; loadTransactions()" class="input-cyber w-20 sm:w-28 text-xs py-1.5">
        <template x-for="y in [2024,2025,2026,2027,2028]">
          <option :value="y" x-text="y"></option>
        </template>
      </select>
      <select x-model="filter.month" @change="txnPage = 1; loadTransactions()" class="input-cyber w-24 sm:w-32 text-xs py-1.5">
        <template x-for="(mName, idx) in ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']">
          <option :value="idx+1" x-text="mName"></option>
        </template>
      </select>
      <div class="relative flex-1 min-w-[150px] max-w-xs">
        <input x-ref="searchInput" type="text" x-model="searchQuery" placeholder="🔍 Search transactions..."
               class="input-cyber text-xs py-1.5 pl-8 w-full">
        <svg x-show="searchQuery" @click="searchQuery = ''" class="absolute right-2 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-slate-500 cursor-pointer hover:text-slate-300" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.28 7.22a.75.75 0 00-1.06 1.06L8.94 10l-1.72 1.72a.75.75 0 101.06 1.06L10 11.06l1.72 1.72a.75.75 0 101.06-1.06L11.06 10l1.72-1.72a.75.75 0 00-1.06-1.06L10 8.94 8.28 7.22z" clip-rule="evenodd"/></svg>
      </div>
      <select x-model="filter.account_id" @change="txnPage = 1; loadTransactions()" class="input-cyber text-xs py-1.5 w-auto">
        <option value="">All Accounts</option>
        <template x-for="a in accounts" :key="a.id">
          <option :value="a.id" x-text="a.name"></option>
        </template>
      </select>
      <a :href="'/api/transactions/export/csv/?year=' + filter.year + '&month=' + filter.month"
         class="btn-cyber text-xs py-1.5">⬇ CSV</a>
      <a :href="'/api/transactions/export/xlsx/?year=' + filter.year + '&month=' + filter.month"
         class="btn-cyber text-xs py-1.5" target="_blank">⬇ XLSX</a>
      <label class="btn-cyber text-xs py-1.5 cursor-pointer">
        ⬆ Import
        <input type="file" accept=".csv" class="hidden" @change="importCSV($event)">
      </label>
    </div>

    <div class="flex items-center gap-3 mb-3" x-show="selectedTxnIds.length > 0">
      <span class="text-xs text-slate-500" x-text="selectedTxnIds.length + ' selected'"></span>
      <button @click="bulkDelete()" class="text-xs px-3 py-1 rounded bg-rose-900/50 text-rose-300 border border-rose-500/30 hover:bg-rose-800/50 transition-colors">🗑 Delete Selected</button>
      <button @click="selectedTxnIds = []" class="text-xs px-3 py-1 rounded bg-slate-800/50 text-slate-400 hover:text-slate-300 transition-colors">Cancel</button>
    </div>

    <div class="flex items-center justify-between mb-3" x-show="txnTotal > txnPageSize">
      <span class="text-[10px] text-slate-600" x-text="'Showing ' + Math.min(txnPage * txnPageSize, txnTotal) + ' of ' + txnTotal"></span>
      <div class="flex gap-2">
        <button @click="txnPage = Math.max(1, txnPage - 1); loadTransactions()"
                :disabled="txnPage <= 1"
                class="text-xs text-slate-600 hover:text-cyan-400 disabled:text-slate-800 disabled:cursor-not-allowed transition-colors">← Prev</button>
        <button @click="txnPage = Math.min(Math.ceil(txnTotal / txnPageSize), txnPage + 1); loadTransactions()"
                :disabled="txnPage >= Math.ceil(txnTotal / txnPageSize)"
                class="text-xs text-slate-600 hover:text-cyan-400 disabled:text-slate-800 disabled:cursor-not-allowed transition-colors">Next →</button>
      </div>
    </div>

    <div class="overflow-x-auto">
      <table class="table-cyber w-full">
        <thead>
          <tr>
            <th class="w-8"><input type="checkbox" @change="toggleSelectAll()" :checked="selectedTxnIds.length === filteredTransactions.length && filteredTransactions.length > 0" class="rounded border-slate-600 bg-slate-800 text-cyan-500 focus:ring-cyan-500"></th>
            <th>Date</th>
            <th>Detail</th>
            <th class="w-12">Receipt</th>
            <th>Category</th>
            <th>Subcategory</th>
            <th>Account</th>
            <th>Mode</th>
            <th>Amount</th>
            <th>Balance</th>
            <th>Loan Bal</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <template x-for="txn in filteredTransactions" :key="txn.id">
            <tr class="hover:bg-slate-800/40 hover:border-l-2 hover:border-cyan-400 transition-all duration-200"
                :class="selectedTxnIds.includes(txn.id) ? 'bg-cyan-900/20 border-l-2 border-cyan-400' : ''">
              <td><input type="checkbox" :checked="selectedTxnIds.includes(txn.id)" @change="toggleSelectTxn(txn.id)" class="rounded border-slate-600 bg-slate-800 text-cyan-500 focus:ring-cyan-500"></td>
              <td class="text-slate-400" x-text="txn.date"></td>
              <td x-text="txn.detail"></td>
              <td class="text-center">
                <template x-if="txn.receipt_url">
                  <div class="relative group inline-block">
                    <img :src="txn.receipt_url" alt="receipt"
                         class="w-8 h-8 object-cover rounded cursor-pointer border border-slate-600/50 hover:border-cyan-400/50 transition-all"
                         @click="receiptPreview = txn.receipt_url">
                    <button @click.stop="deleteReceipt(txn.id)"
                            class="absolute -top-1.5 -right-1.5 w-4 h-4 rounded-full bg-rose-900/80 text-rose-300 text-[8px] flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity hover:bg-rose-700">
                      ✕
                    </button>
                  </div>
                </template>
                <template x-if="!txn.receipt_url">
                  <label class="cursor-pointer text-slate-600 hover:text-cyan-400 transition-colors p-1 block">
                    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" class="w-4 h-4 mx-auto"><path d="M4 15l4-4 2 2 5-5 3 3"/><path d="M2 4h16v12H2z"/><path d="M7 8a1 1 0 100-2 1 1 0 000 2z"/></svg>
                    <input type="file" accept="image/*" class="hidden" @change="uploadReceipt(txn.id, $event)">
                  </label>
                </template>
              </td>
              <td>
                <span class="pillar-badge text-[10px]"
                      :class="txn.category"
                      x-text="txn.category || '—'"></span>
              </td>
              <td class="text-slate-400 text-xs" x-text="txn.subcategory || '—'"></td>
              <td class="text-[10px] text-slate-600" x-text="txn.account_name || '—'"></td>
              <td class="text-[10px] text-slate-500" x-text="txn.payment_mode || '—'"></td>
              <td class="text-right font-mono"
                  :class="['INCOME'].includes(txn.category) ? 'neon-text-emerald' : 'neon-text-rose'"
                  x-text="'₱' + numberWithCommas(txn.amount)"></td>
              <td class="text-right font-mono text-[10px]"
                  :class="runningBalance(txn.id) >= 0 ? 'text-emerald-500' : 'text-rose-500'"
                  x-text="'₱' + numberWithCommas(runningBalance(txn.id))"></td>
              <td class="text-right font-mono text-[10px]"
                  :class="txn.debt_outstanding_balance !== null ? (txn.category === 'INCOME' ? 'text-emerald-500' : 'text-rose-500') : 'text-slate-600'"
                  x-text="txn.debt_outstanding_balance !== null ? '₱' + numberWithCommas(txn.debt_outstanding_balance) : '—'"></td>
              <td>
                <div class="flex gap-1 md:gap-2">
                  <button @click="cloneTransaction(txn)"
                          class="text-xs text-slate-600 hover:text-cyan-400 transition-colors p-1.5 md:p-0">
                    ⧉
                  </button>
                  <button x-show="!txn.debt_history_id && txn.category !== 'SAVINGS_INVESTMENTS'"
                          @click="editTxn = { id: txn.id, date: txn.date, detail: txn.detail, amount: txn.amount, category_id: txn.category_id, subcategory_id: txn.subcategory_id, payment_mode: txn.payment_mode || '' }; loadSubcategories(txn.category_id); openModal('edit-txn-modal')"
                          class="text-xs text-slate-600 hover:text-amber-400 transition-colors p-1.5 md:p-0">
                    ✎
                  </button>
                  <button x-show="!txn.debt_history_id && txn.category !== 'SAVINGS_INVESTMENTS'"
                          @click="deleteTransaction(txn.id)"
                          class="text-xs text-slate-600 hover:text-rose-400 transition-colors p-1.5 md:p-0">
                    ✕
                  </button>
                </div>
              </td>
            </tr>
          </template>
          <tr x-show="transactions.length === 0">
            <td colspan="11" class="text-center text-slate-600 py-8">No transactions recorded</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <div id="txn-modal"
       x-show="modalOpen === 'txn-modal'"
       @keydown.escape.window="closeModal()"
       class="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/80 backdrop-blur-sm"
       @click="closeModal()"
       x-transition:enter="transition ease-out duration-300"
       x-transition:enter-start="opacity-0"
       x-transition:enter-end="opacity-100"
       x-transition:leave="transition ease-in duration-200"
       x-transition:leave-start="opacity-100"
       x-transition:leave-end="opacity-0">
    <div class="w-full max-w-lg p-4" @click.stop>
      <div class="glass-panel p-6">
        <h3 class="text-sm font-mono neon-text-cyan mb-4">New Transaction Entry</h3>
        <form @submit.prevent="handleTransactionSubmit(); closeModal()" class="space-y-4">
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-xs text-slate-500 mb-1">Date</label>
              <input type="date" x-model="form.date" class="input-cyber text-xs" required>
            </div>
            <div>
              <label class="block text-xs text-slate-500 mb-1">Amount (₱)</label>
              <input type="number" step="0.01" x-model="form.amount" class="input-cyber text-xs" required>
            </div>
          </div>
          <div>
            <label class="block text-xs text-slate-500 mb-1">Detail</label>
            <input type="text" x-model="form.detail" class="input-cyber text-xs" placeholder="Transaction description">
          </div>
          <div>
            <label class="block text-xs text-slate-500 mb-1">Financial Pillar</label>
            <select x-model="form.category_id" @change="loadSubcategories(form.category_id)" class="input-cyber text-xs" required>
              <option value="">— Select Pillar —</option>
              <template x-for="p in pillars" :key="p.id">
                <option :value="p.id" x-text="p.display"></option>
              </template>
            </select>
          </div>
          <div>
            <label class="block text-xs text-slate-500 mb-1">Sub-Category</label>
            <select x-model="form.subcategory_id" class="input-cyber text-xs">
              <option value="">— Select Sub-Category —</option>
              <template x-for="s in getFilteredSubcategories()" :key="s.id">
                <option :value="s.id" x-text="s.name"></option>
              </template>
            </select>
          </div>
          <div>
            <label class="block text-xs text-slate-500 mb-1">Account</label>
            <select x-model="form.account_id" class="input-cyber text-xs">
              <option value="">— Select Account —</option>
              <template x-for="a in accounts" :key="a.id">
                <option :value="a.id" x-text="a.name + ' (' + a.account_type_display + ')'"></option>
              </template>
            </select>
          </div>
          <div>
            <label class="block text-xs text-slate-500 mb-1">Payment Mode</label>
            <select x-model="form.payment_mode" class="input-cyber text-xs">
              <option value="">— Select —</option>
              <option value="Cash">Cash</option>
              <option value="Bank Transfer">Bank Transfer</option>
              <option value="GCash">GCash</option>
              <option value="Maya">Maya</option>
              <option value="Check">Check</option>
              <option value="Credit Card">Credit Card</option>
              <option value="Debit Card">Debit Card</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="flex gap-3 justify-end">
            <button type="button" @click="closeModal()" class="text-xs text-slate-500 hover:text-slate-300 px-4 py-2">Cancel</button>
            <button type="submit" class="btn-cyber-emerald text-xs">⏎ Execute Entry</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div id="edit-txn-modal"
       x-show="modalOpen === 'edit-txn-modal'"
       @keydown.escape.window="closeModal()"
       class="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/80 backdrop-blur-sm"
       @click="closeModal()"
       x-transition:enter="transition ease-out duration-300"
       x-transition:enter-start="opacity-0"
       x-transition:enter-end="opacity-100"
       x-transition:leave="transition ease-in duration-200"
       x-transition:leave-start="opacity-100"
       x-transition:leave-end="opacity-0">
    <div class="w-full max-w-lg p-4" @click.stop>
      <div class="glass-panel p-6">
        <h3 class="text-sm font-mono neon-text-amber mb-4">Edit Transaction</h3>
        <form @submit.prevent="editTransaction(editTxn.id); closeModal()" class="space-y-4">
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-xs text-slate-500 mb-1">Date</label>
              <input type="date" x-model="editTxn.date" class="input-cyber text-xs" required>
            </div>
            <div>
              <label class="block text-xs text-slate-500 mb-1">Amount (₱)</label>
              <input type="number" step="0.01" x-model="editTxn.amount" class="input-cyber text-xs" required>
            </div>
          </div>
          <div>
            <label class="block text-xs text-slate-500 mb-1">Detail</label>
            <input type="text" x-model="editTxn.detail" class="input-cyber text-xs">
          </div>
          <div>
            <label class="block text-xs text-slate-500 mb-1">Financial Pillar</label>
            <select x-model="editTxn.category_id" @change="loadSubcategories(editTxn.category_id)" class="input-cyber text-xs" required>
              <option value="">— Select Pillar —</option>
              <template x-for="p in pillars" :key="p.id">
                <option :value="p.id" x-text="p.display"></option>
              </template>
            </select>
          </div>
          <div>
            <label class="block text-xs text-slate-500 mb-1">Sub-Category</label>
            <select x-model="editTxn.subcategory_id" class="input-cyber text-xs">
              <option value="">— Select Sub-Category —</option>
              <template x-for="s in getFilteredSubcategoriesForEdit()" :key="s.id">
                <option :value="s.id" x-text="s.name"></option>
              </template>
            </select>
          </div>
          <div>
            <label class="block text-xs text-slate-500 mb-1">Payment Mode</label>
            <select x-model="editTxn.payment_mode" class="input-cyber text-xs">
              <option value="">— Select —</option>
              <option value="Cash">Cash</option>
              <option value="Bank Transfer">Bank Transfer</option>
              <option value="GCash">GCash</option>
              <option value="Maya">Maya</option>
              <option value="Check">Check</option>
              <option value="Credit Card">Credit Card</option>
              <option value="Debit Card">Debit Card</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="flex gap-3 justify-end">
            <button type="button" @click="closeModal()" class="text-xs text-slate-500 hover:text-slate-300 px-4 py-2">Cancel</button>
            <button type="submit" class="btn-cyber-amber text-xs">✎ Update Transaction</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div x-show="receiptPreview" class="fixed inset-0 z-[200] flex items-center justify-center bg-black/80 backdrop-blur-sm"
       @click="receiptPreview = null">
    <div class="relative max-w-3xl max-h-[90vh] mx-4">
      <img :src="receiptPreview" class="max-w-full max-h-[85vh] rounded-lg shadow-2xl border border-slate-700/50">
      <button @click="receiptPreview = null"
              class="absolute -top-3 -right-3 w-8 h-8 rounded-full bg-slate-800 border border-slate-600 text-slate-400 hover:text-white flex items-center justify-center text-sm transition-colors">
        ✕
      </button>
    </div>
  </div>
</div>
