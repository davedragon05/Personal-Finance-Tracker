<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JARVIS — Change Password</title>
  {% load static %}
  <link rel="stylesheet" href="{% static 'dist/css/main.css' %}">
</head>
<body class="min-h-screen flex items-center justify-center bg-slate-950 p-4">
  <div class="w-full max-w-md glass-panel p-8">
    <h1 class="text-lg font-mono neon-text-cyan text-center mb-6">CHANGE PASSWORD</h1>
    <form method="post" class="space-y-4">
      {% csrf_token %}
      <div>
        <label class="block text-xs text-slate-500 mb-1">Old Password</label>
        <input type="password" name="old_password" class="input-cyber text-xs" required>
      </div>
      <div>
        <label class="block text-xs text-slate-500 mb-1">New Password</label>
        <input type="password" name="new_password1" class="input-cyber text-xs" required>
      </div>
      <div>
        <label class="block text-xs text-slate-500 mb-1">Confirm New Password</label>
        <input type="password" name="new_password2" class="input-cyber text-xs" required>
      </div>
      {% if form.errors %}
      <div class="text-xs text-rose-400 space-y-1">
        {% for field, errors in form.errors.items %}
          {% for error in errors %}<p>{{ error }}</p>{% endfor %}
        {% endfor %}
      </div>
      {% endif %}
      <button type="submit" class="btn-cyber w-full text-xs py-2">⏎ Update Password</button>
      <a href="/" class="block text-center text-xs text-slate-600 hover:text-slate-400 mt-4">← Back to Terminal</a>
    </form>
  </div>
</body>
</html>
