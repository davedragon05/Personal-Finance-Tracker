{% extends "tracker/base.html" %}

{% block title %}No-Spend Calendar{% endblock %}

{% block content %}
<div class="max-w-5xl mx-auto" x-data="calendarApp()" x-init="initCalendar()">
    <h2 class="text-2xl font-bold text-gray-100 mb-4">No-Spend Day Calendar</h2>

    <div class="flex gap-3 mb-4">
        <div class="flex items-center gap-1.5 text-sm">
            <span class="inline-block w-3 h-3 rounded-full bg-emerald-500"></span>
            <span class="text-gray-400">No Spend</span>
        </div>
        <div class="flex items-center gap-1.5 text-sm">
            <span class="inline-block w-3 h-3 rounded-full bg-red-500"></span>
            <span class="text-gray-400">Spent</span>
        </div>
    </div>

    <div class="bg-gray-800 border border-gray-700/50 rounded-lg p-4">
        <div id="calendar"></div>
    </div>

    <!-- Day Detail Modal -->
    <div id="dayDetailModal" tabindex="-1" aria-hidden="true"
         class="hidden overflow-y-auto overflow-x-hidden fixed top-0 right-0 left-0 z-50 justify-center items-center w-full md:inset-0 h-[calc(100%-1rem)] max-h-full">
        <div class="relative p-4 w-full max-w-lg max-h-full">
            <div class="relative bg-gray-800 rounded-lg shadow-lg border border-gray-700/50">
                <div class="flex items-center justify-between p-4 border-b border-gray-700/50">
                    <h3 class="text-lg font-semibold text-white">
                        <span x-text="dayDetail.date"></span>
                        <span class="text-sm font-normal text-gray-400 ml-2">
                            Total: ₱<span x-text="Number(dayDetail.total).toLocaleString()" class="text-emerald-400 font-semibold"></span>
                        </span>
                    </h3>
                    <button type="button" @click="closeDayDetail()"
                            class="text-gray-400 bg-transparent hover:bg-gray-700 hover:text-white rounded-lg text-sm w-8 h-8 ms-auto inline-flex justify-center items-center">
                        <svg class="w-3 h-3" fill="none" viewBox="0 0 14 14">
                            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6"/>
                        </svg>
                    </button>
                </div>
                <div class="p-4 max-h-96 overflow-y-auto">
                    <div x-show="dayDetailLoading" class="text-center py-8 text-gray-500">Loading...</div>
                    <template x-for="cat in dayDetail.categories" :key="cat.category_name">
                        <div class="mb-4 last:mb-0">
                            <div class="flex items-center justify-between mb-2">
                                <h4 class="text-sm font-semibold text-gray-200 uppercase tracking-wider" x-text="cat.category_name"></h4>
                                <span class="text-sm font-medium text-gray-400">₱<span x-text="Number(cat.subtotal).toLocaleString()"></span></span>
                            </div>
                            <div class="space-y-1.5">
                                <template x-for="item in cat.items" :key="item.id">
                                    <div class="flex items-center justify-between px-3 py-2 rounded bg-gray-700/40 text-sm">
                                        <div>
                                            <span class="text-gray-200" x-text="item.subcategory"></span>
                                            <p x-show="item.detail" class="text-xs text-gray-500 mt-0.5" x-text="item.detail"></p>
                                        </div>
                                        <span class="text-gray-300 font-medium whitespace-nowrap ml-3">₱<span x-text="Number(item.amount).toLocaleString()"></span></span>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>
                    <div x-show="!dayDetailLoading && dayDetail.categories.length === 0" class="text-center py-8 text-gray-500">
                        No transactions on this day.
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<style>
    .fc { background: #1F2937; color: #D1D5DB; }
    .fc-toolbar-title { color: #F9FAFB; }
    .fc-button { background: #374151; border-color: #4B5563; color: #D1D5DB; }
    .fc-button:hover { background: #4B5563; }
    .fc-daygrid-day { border-color: #374151; }
    .fc-col-header-cell { background: #111827; color: #9CA3AF; }
    .fc-day-today { background: rgba(16, 185, 129, 0.1) !important; }
    .fc-day-other { background: #111827; opacity: 0.5; }
    .no-spend-day { background-color: #065F46 !important; border-color: #047857 !important; }
    .spend-day { background-color: #7F1D1D !important; border-color: #B91C1C !important; }
    .cursor-pointer { cursor: pointer; }
    .fc-daygrid-day.fc-day-today .day-highlight { background: rgba(16, 185, 129, 0.15); }
    [x-cloak] { display: none !important; }
</style>

<script>
    function calendarApp() {
        return {
            currentYear: {{ current_year }},
            currentMonth: {{ current_month }},
            calendarInstance: null,
            dayDetail: { date: '', total: 0, categories: [] },
            dayDetailLoading: false,
            _dayModal: null,

            initCalendar() {
                const el = document.getElementById('calendar');
                if (!el) return;

                this.calendarInstance = new FullCalendar.Calendar(el, {
                    initialView: 'dayGridMonth',
                    initialDate: `${this.currentYear}-${String(this.currentMonth).padStart(2, '0')}-01`,
                    headerToolbar: {
                        left: 'prev,next today',
                        center: 'title',
                        right: 'dayGridMonth'
                    },
                    height: 'auto',
                    dateClick: (info) => {
                        this.openDayDetail(info.dateStr);
                    },
                    eventClick: (info) => {
                        this.openDayDetail(info.event.startStr.split('T')[0]);
                    },
                    eventDidMount(info) {
                        info.el.setAttribute('title', info.event.title);
                    },
                    datesSet: (info) => {
                        const d = info.view.currentStart;
                        this.currentYear = d.getFullYear();
                        this.currentMonth = d.getMonth() + 1;
                        this.loadCalendarEvents();
                    }
                });

                this.calendarInstance.render();
                this.loadCalendarEvents();
            },

            loadCalendarEvents() {
                if (!this.calendarInstance) return;
                const url = `{% url "tracker:calendar-events" %}?year=${this.currentYear}&month=${this.currentMonth}`;
                fetch(url)
                    .then(r => r.json())
                    .then(events => {
                        this.calendarInstance.removeAllEvents();
                        events.forEach(event => this.calendarInstance.addEvent(event));
                    })
                    .catch(e => console.error('Calendar load error:', e));
            },

            openDayDetail(dateStr) {
                this.dayDetailLoading = true;
                this.dayDetail = { date: dateStr, total: 0, categories: [] };
                if (!this._dayModal) {
                    this._dayModal = new Modal(document.getElementById('dayDetailModal'));
                }
                this._dayModal.show();
                fetch(`{% url "tracker:calendar-day-detail" %}?date=${dateStr}`)
                    .then(r => r.json())
                    .then(data => {
                        this.dayDetail = data;
                    })
                    .catch(e => {
                        console.error('Day detail error:', e);
                    })
                    .finally(() => {
                        this.dayDetailLoading = false;
                    });
            },

            closeDayDetail() {
                if (this._dayModal) this._dayModal.hide();
            }
        };
    }
</script>
{% endblock %}
