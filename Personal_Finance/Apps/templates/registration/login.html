<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Personal Finance Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: #111827;
            background-image:
                linear-gradient(rgba(55, 65, 81, 0.12) 1px, transparent 1px),
                linear-gradient(90deg, rgba(55, 65, 81, 0.12) 1px, transparent 1px);
            background-size: 48px 48px;
        }
        .scan-line::after {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 0, 0, 0.02) 2px,
                rgba(0, 0, 0, 0.02) 4px
            );
            pointer-events: none;
            z-index: 9998;
        }
        .glass-card {
            background: rgba(31, 41, 55, 0.65);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(75, 85, 99, 0.25);
        }
        .glow-emerald {
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.12), 0 0 30px rgba(16, 185, 129, 0.04);
        }
        .gradient-text {
            background: linear-gradient(135deg, #34D399, #059669);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .pulse-dot {
            width: 7px; height: 7px;
            background: #34D399;
            border-radius: 50%;
            display: inline-block;
            animation: pulseDot 2s ease-in-out infinite;
            vertical-align: middle;
        }
        @keyframes pulseDot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.75); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }
        .hud-accent {
            height: 2px;
            background: linear-gradient(90deg, transparent, #34D399, transparent);
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(18px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-slide-up {
            animation: slideUp 0.45s ease-out both;
        }
        .animate-slide-up-1 { animation-delay: 0.05s; }
        .animate-slide-up-2 { animation-delay: 0.1s; }
        .animate-slide-up-3 { animation-delay: 0.15s; }
        input:-webkit-autofill,
        input:-webkit-autofill:focus {
            transition: background-color 600000s 0s, color 600000s 0s;
        }
    </style>
</head>
<body class="bg-gray-900 min-h-screen">
<div class="scan-line"></div>

<div class="flex items-center justify-center min-h-screen px-4 fade-in">
    <div class="w-full max-w-md">
        <!-- Brand -->
        <div class="text-center mb-8 animate-slide-up animate-slide-up-1">
            <span class="pulse-dot"></span>
            <span class="inline-block ml-2 text-2xl font-bold text-white tracking-tight">Finance<span class="text-emerald-400">Tracker</span></span>
            <div class="hud-accent w-24 mx-auto mt-3"></div>
        </div>

        <!-- Login Card -->
        <div class="glass-card rounded-xl p-8 glow-emerald animate-slide-up animate-slide-up-2">
            <h2 class="text-lg font-semibold text-gray-100 mb-6 text-center">Sign In</h2>

            <form method="post" action="{% url 'login' %}">
                {% csrf_token %}
                <div class="mb-4">
                    <label for="username" class="block mb-2 text-sm font-medium text-gray-300">Username</label>
                    <input type="text" name="username" id="username"
                           class="bg-gray-700/70 border border-gray-600/50 text-gray-200 text-sm rounded-lg focus:ring-emerald-500/30 focus:border-emerald-500/50 block w-full p-2.5 placeholder-gray-500 transition-colors"
                           placeholder="your username" required>
                </div>
                <div class="mb-6">
                    <label for="password" class="block mb-2 text-sm font-medium text-gray-300">Password</label>
                    <input type="password" name="password" id="password"
                           class="bg-gray-700/70 border border-gray-600/50 text-gray-200 text-sm rounded-lg focus:ring-emerald-500/30 focus:border-emerald-500/50 block w-full p-2.5 placeholder-gray-500 transition-colors"
                           placeholder="••••••••" required>
                </div>
                <button type="submit"
                        class="w-full text-white bg-emerald-600 hover:bg-emerald-500 focus:ring-4 focus:ring-emerald-300/20 font-medium rounded-lg text-sm px-5 py-2.5 text-center transition-all glow-emerald-strong">
                    Sign In
                </button>
            </form>

            {% if form.errors %}
            <div class="mt-4 p-3 text-sm text-red-300 rounded-lg bg-red-900/30 border border-red-800/50 text-center">
                Invalid username or password.
            </div>
            {% endif %}
        </div>

        <!-- Footer -->
        <p class="text-center text-xs text-gray-600 mt-6 animate-slide-up animate-slide-up-3">
            Personal Finance Tracker
        </p>
    </div>
</div>
</body>
</html>
