<div class="lg:flex lg:gap-6">
  <div class="flex-1 min-w-0 space-y-6">
    <div class="flex items-center justify-between">
      <h2 class="text-lg font-mono neon-text-cyan">📡 NO-SPEND DAY RADAR</h2>
      <div class="flex items-center gap-3 text-xs">
        <span class="flex items-center gap-1"><span class="w-3 h-3 rounded bg-emerald-400/50"></span> No Spend</span>
        <span class="flex items-center gap-1"><span class="w-3 h-3 rounded bg-rose-400/50"></span> Spend Day</span>
      </div>
    </div>

    <div class="glass-panel p-5">
      <div id="nospend-calendar" class="jarvis-calendar w-full"></div>
    </div>
  </div>

  <div x-show="selectedDate"
       x-transition:enter="transition ease-out duration-300"
       x-transition:enter-start="opacity-0 translate-x-8 lg:opacity-100 lg:translate-x-0"
       x-transition:enter-end="opacity-100 translate-x-0"
       x-transition:leave="transition ease-in duration-200"
       x-transition:leave-start="opacity-100 translate-x-0"
       x-transition:leave-end="opacity-0 translate-x-8"
       class="cal-drawer-panel">

    <div x-show="selectedDate" @click="selectedDate = null" class="cal-drawer-backdrop"></div>

    <div class="cal-drawer-content p-4">
      <div class="flex items-center justify-between mb-4 lg:hidden">
        <span class="text-sm font-mono text-cyan-400" x-text="formatShortDate(selectedDate)"></span>
        <button @click="selectedDate = null" class="text-slate-500 hover:text-rose-400 transition-colors text-lg leading-none">&times;</button>
      </div>

      <div class="hidden lg:flex items-center justify-between mb-4">
        <h3 class="text-sm font-mono neon-text-cyan" x-text="formatShortDate(selectedDate)"></h3>
        <button @click="selectedDate = null" class="text-slate-500 hover:text-rose-400 transition-colors text-lg leading-none">&times;</button>
      </div>

      <div x-show="selectedDateLoading" class="flex items-center justify-center py-12">
        <div class="w-5 h-5 border-2 border-cyan-400/30 border-t-cyan-400 rounded-full animate-spin"></div>
        <span class="text-xs text-slate-500 ml-3">Loading transactions...</span>
      </div>

      <div x-show="!selectedDateLoading" class="flex items-center justify-between text-xs mb-3 pb-2 border-b border-slate-800/60">
        <span class="text-slate-500">
          <span x-text="selectedDateTransactions.length"></span> transaction<span x-show="selectedDateTransactions.length !== 1">s</span>
        </span>
        <span class="font-mono text-rose-400" x-text="formatCurrency(selectedDateTransactions.reduce((s, t) => s + parseFloat(t.amount || 0), 0))"></span>
      </div>

      <template x-if="!selectedDateLoading && selectedDateTransactions.length > 0">
        <div class="space-y-1 mb-4 pb-3 border-b border-slate-800/60">
          <div x-show="dayBreakdown.income > 0" class="flex items-center justify-between text-xs">
            <span class="text-emerald-400">Income</span>
            <span class="font-mono text-emerald-400" x-text="formatCurrency(dayBreakdown.income)"></span>
          </div>
          <div x-show="dayBreakdown.expenses > 0" class="flex items-center justify-between text-xs">
            <span class="text-rose-400">Expenses</span>
            <span class="font-mono text-rose-400" x-text="formatCurrency(dayBreakdown.expenses)"></span>
          </div>
          <div x-show="dayBreakdown.savings > 0" class="flex items-center justify-between text-xs">
            <span class="text-teal-400">Savings</span>
            <span class="font-mono text-teal-400" x-text="formatCurrency(dayBreakdown.savings)"></span>
          </div>
          <div x-show="dayBreakdown.debt > 0" class="flex items-center justify-between text-xs">
            <span class="text-red-400">Debt Pmt</span>
            <span class="font-mono text-red-400" x-text="formatCurrency(dayBreakdown.debt)"></span>
          </div>
          <div class="pt-1.5 mt-1.5 border-t border-slate-800/40 flex items-center justify-between text-xs font-semibold">
            <span class="text-slate-300">Net</span>
            <span class="font-mono" :class="dayBreakdown.net >= 0 ? 'text-emerald-400' : 'text-rose-400'" x-text="formatCurrency(dayBreakdown.net)"></span>
          </div>
        </div>
      </template>

      <div class="space-y-2">
        <template x-for="txn in selectedDateTransactions" :key="txn.id">
          <div class="flex items-center justify-between p-2.5 rounded-lg bg-slate-800/40 border border-slate-700/40 hover:border-slate-600/60 transition-colors">
            <div class="min-w-0 mr-2">
              <div class="text-xs text-slate-200 truncate" x-text="txn.detail || txn.subcategory || '—'"></div>
              <div class="flex items-center gap-1.5 mt-1">
                <span :class="'pillar-badge ' + (txn.category || '')" x-text="txn.category || '—'" class="text-[9px]"></span>
                <span x-show="txn.payment_mode" class="text-[9px] text-slate-600 uppercase" x-text="txn.payment_mode"></span>
              </div>
            </div>
            <span class="text-xs font-mono text-rose-400 shrink-0" x-text="formatCurrency(txn.amount)"></span>
          </div>
        </template>
        <div x-show="selectedDateTransactions.length === 0" class="text-center py-8">
          <div class="text-lg mb-1">✨</div>
          <div class="text-xs text-emerald-400">No Spend Day</div>
        </div>
      </div>
    </div>
  </div>
</div>
